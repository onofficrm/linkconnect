name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: linkconnect-ftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: builder/linkconnect_source/package-lock.json

      - name: Build LinkConnect SPA
        run: |
          cd builder/linkconnect_source
          npm ci
          npm run deploy:imports
          test -f ../../plugin/onoff-builder-bridge/imports/linkconnect/index.html
          echo "Bundle: $(grep -o 'index-[A-Za-z0-9]*\.js' ../../plugin/onoff-builder-bridge/imports/linkconnect/index.html)"

      - name: Clean junk files before upload
        run: |
          find plugin/onoff-builder-bridge/imports/linkconnect -name '._*' -delete 2>/dev/null || true
          find plugin/onoff-builder-bridge/imports/linkconnect -name '.DS_Store' -delete 2>/dev/null || true

      - name: Deploy app code (PHP · skin · CSS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          parallel: 1
          protocol: ftp
          local-dir: ./
          server-dir: /public_html/
          state-name: linkconnect-code-v1
          log-level: verbose
          include: |
            css/onoff-platform.css
            extend/linkconnect-member.extend.php
            extend/linkconnect-spa.extend.php
            skin/_inc/**
            skin/member/onoff/**
            mobile/skin/member/onoff/**
            favicon.png
            about/**
            affiliate/**
            notice/**
            .htaccess
            inc/linkconnect-spa-bootstrap.php
            plugin/onoff-builder-bridge/lib/**
            plugin/onoff-builder-bridge/data/**

      - name: Wait between FTP sessions
        run: sleep 15

      - name: Deploy SPA core (HTML · JS · CSS · favicon)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          parallel: 1
          protocol: ftp
          local-dir: plugin/onoff-builder-bridge/imports/linkconnect/
          server-dir: /public_html/plugin/onoff-builder-bridge/imports/linkconnect/
          state-name: linkconnect-spa-core-v1
          log-level: verbose
          include: |
            index.html
            favicon.png
            favicon-32.png
            apple-touch-icon.png
            hero_dashboard_mockup.png
            assets/**

      - name: Wait between FTP sessions
        run: sleep 15

      - name: Deploy SPA static images (about · webtoon)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        continue-on-error: true
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          parallel: 1
          protocol: ftp
          local-dir: plugin/onoff-builder-bridge/imports/linkconnect/
          server-dir: /public_html/plugin/onoff-builder-bridge/imports/linkconnect/
          state-name: linkconnect-spa-media-v1
          log-level: verbose
          include: |
            about/**
            webtoon/**
