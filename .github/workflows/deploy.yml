name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: linkconnect-ftp-deploy
  cancel-in-progress: true

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: builder/linkconnect_source/package-lock.json

      - name: Build LinkConnect SPA
        run: |
          cd builder/linkconnect_source
          npm ci
          npm run deploy:imports
          test -f ../../plugin/onoff-builder-bridge/imports/linkconnect/index.html
          echo "Bundle: $(grep -o 'index-[A-Za-z0-9]*\.js' ../../plugin/onoff-builder-bridge/imports/linkconnect/index.html)"

      - name: Deploy member UI (priority)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          parallel: 3
          protocol: ftp
          local-dir: ./
          server-dir: /public_html/
          state-name: linkconnect-member-ui-v1
          log-level: minimal
          include: |
            css/onoff-platform.css
            extend/linkconnect-member.extend.php
            extend/linkconnect-spa.extend.php
            skin/_inc/**
            skin/member/onoff/**
            mobile/skin/member/onoff/**
            favicon.png

      - name: Deploy bridge PHP (priority)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          parallel: 2
          protocol: ftp
          local-dir: plugin/onoff-builder-bridge/
          server-dir: /public_html/plugin/onoff-builder-bridge/
          state-name: linkconnect-bridge-php-v2
          log-level: minimal
          include: |
            lib/**
            data/**

      - name: Deploy SPA bootstrap PHP (priority)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          parallel: 1
          protocol: ftp
          local-dir: inc/
          server-dir: /public_html/inc/
          state-name: linkconnect-inc-v2
          log-level: minimal
          include: |
            linkconnect-spa-bootstrap.php

      - name: Deploy SPA assets
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          parallel: 2
          protocol: ftp
          local-dir: plugin/onoff-builder-bridge/imports/linkconnect/
          server-dir: /public_html/plugin/onoff-builder-bridge/imports/linkconnect/
          state-name: linkconnect-spa-v3
          log-level: minimal
          exclude: |
            **/._*
            **/.DS_Store

      - name: Deploy site via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          parallel: 2
          protocol: ftp
          local-dir: ./
          server-dir: /public_html/
          state-name: linkconnect-deploy-v4
          log-level: minimal
          exclude: |
            **/.git*
            **/.github/**
            **/.DS_Store
            **/.vscode/**
            **/._*
            _backup_transfer_*/
            **/_backup_transfer_*/
            _BUILDER_INPUT/**
            builder/**
            plugin/onoff-builder-bridge/imports/**
            /data/**
            /cache/**
            /session/**
            /tmp/**
            *.log
            .env
            .env.*
